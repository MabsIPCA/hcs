name: Helm Chart Scan
on:
  pull_request:
  push:
    branches: [master, main]
permissions:
  contents: read
  pull-requests: write
  security-events: write
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HCS scan
        uses: ./
        with:
          path: "."
          # kics-config: ".kics.yaml"
          # trivy-config: "trivy.yaml"
